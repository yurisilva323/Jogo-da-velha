<!DOCTYPE html>
<html lang="pt-br">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Player vs Yuri</title>
    <style>
        body { font-family: sans-serif; display: flex; flex-direction: column; align-items: center; justify-content: center; height: 100vh; margin: 0; background-color: #f0f2f5; }
        .board { display: grid; grid-template-columns: repeat(3, 100px); gap: 10px; background: #2c3e50; padding: 10px; border-radius: 10px; }
        .cell { width: 100px; height: 100px; background: #fff; display: flex; align-items: center; justify-content: center; font-size: 3rem; font-weight: bold; cursor: pointer; border-radius: 5px; transition: background 0.2s; }
        .cell:hover { background: #ecf0f1; }
        .cell.x { color: #0984e3; }
        .cell.o { color: #e74c3c; }
        .status { margin: 20px; font-size: 1.5rem; font-weight: bold; min-height: 1.6em; }
        button { padding: 10px 20px; font-size: 1rem; cursor: pointer; background: #0984e3; color: white; border: none; border-radius: 5px; transition: opacity 0.2s; }
        button:hover { opacity: 0.8; }
    </style>
</head>
<body>
    <h1>Player vs Yuri</h1>
    <div class="board" id="board">
        <div class="cell" onclick="makeMove(0)"></div>
        <div class="cell" onclick="makeMove(1)"></div>
        <div class="cell" onclick="makeMove(2)"></div>
        <div class="cell" onclick="makeMove(3)"></div>
        <div class="cell" onclick="makeMove(4)"></div>
        <div class="cell" onclick="makeMove(5)"></div>
        <div class="cell" onclick="makeMove(6)"></div>
        <div class="cell" onclick="makeMove(7)"></div>
        <div class="cell" onclick="makeMove(8)"></div>
    </div>
    <div class="status" id="status">Tua vez!</div>
    <button onclick="reset()">Reiniciar Jogo</button>

    <script>
        let b = ["", "", "", "", "", "", "", "", ""];
        let active = true;
        const cells = document.querySelectorAll('.cell');
        const wins = [[0,1,2],[3,4,5],[6,7,8],[0,3,6],[1,4,7],[2,5,8],[0,4,8],[2,4,6]];

        function makeMove(i) {
            if (b[i] === "" && active) {
                b[i] = "X";
                render();
                if (checkWin("X")) { 
                    end("Ganhaste!"); 
                } else if (!b.includes("")) { 
                    end("Empate!"); 
                } else {
                    active = false;
                    document.getElementById('status').innerText = "Yuri a pensar...";
                    setTimeout(yuriTurn, 600);
                }
            }
        }

        function findBestMove(player) {
            for (let s of wins) {
                const line = s.map(i => b[i]);
                // Se o player tem 2 marcas e 1 espaço vazio, retorna o índice do espaço
                if (line.filter(v => v === player).length === 2 && line.includes("")) {
                    return s[line.indexOf("")];
                }
            }
            return null;
        }

        function yuriTurn() {
            // 1. Prioridade Máxima: Ganhar o jogo
            let move = findBestMove("O");

            // 2. Segunda Prioridade: Bloquear o jogador
            if (move === null) move = findBestMove("X");

            // 3. Terceira Prioridade: Dominar o centro (casa 4)
            if (move === null && b[4] === "") move = 4;

            // 4. Quarta Prioridade: Jogada aleatória (caso não haja perigo ou centro ocupado)
            if (move === null) {
                let empty = b.map((v, i) => v === "" ? i : null).filter(v => v !== null);
                move = empty[Math.floor(Math.random() * empty.length)];
            }

            if (move !== null) {
                b[move] = "O";
                render();
                if (checkWin("O")) { 
                    end("O Yuri ganhou!"); 
                } else if (!b.includes("")) { 
                    end("Empate!"); 
                } else { 
                    active = true; 
                    document.getElementById('status').innerText = "Tua vez!"; 
                }
            }
        }

        function render() {
            cells.forEach((c, i) => {
                c.innerText = b[i];
                c.className = `cell ${b[i].toLowerCase()}`;
            });
        }

        function checkWin(p) {
            return wins.some(s => s.every(i => b[i] === p));
        }

        function end(m) { 
            document.getElementById('status').innerText = m; 
            active = false; 
        }

        function reset() {
            b = ["", "", "", "", "", "", "", "", ""];
            active = true;
            document.getElementById('status').innerText = "Tua vez!";
            render();
        }
    </script>
</body>
</html>
