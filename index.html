<!DOCTYPE html>
<html lang="pt-br">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Jogo da Velha - Yuri Pro</title>
    <style>
        :root { --primary: #0984e3; --dark: #2d3436; }
        body { font-family: sans-serif; background-color: #f5f6fa; display: flex; flex-direction: column; align-items: center; justify-content: center; height: 100vh; margin: 0; }
        .board { display: grid; grid-template-columns: repeat(3, 100px); grid-template-rows: repeat(3, 100px); gap: 10px; background-color: var(--dark); padding: 10px; border-radius: 10px; }
        .cell { width: 100px; height: 100px; background-color: white; display: flex; align-items: center; justify-content: center; font-size: 2.5rem; font-weight: bold; cursor: pointer; border-radius: 5px; }
        .cell.x { color: var(--primary); }
        .cell.o { color: #d63031; }
        .status { margin-top: 20px; font-size: 1.2rem; font-weight: bold; height: 30px; color: var(--dark); }
        button { margin-top: 20px; padding: 10px 20px; cursor: pointer; background: var(--primary); color: white; border: none; border-radius: 5px; font-weight: bold; }
        h1 { margin-top: 0; }
    </style>
</head>
<body>
    <h1>Jogo da Velha</h1>
    <div style="margin-bottom: 10px;">Jogador (X) vs <strong style="color: #d63031;">Yuri Inteligente (O)</strong></div>
    <div class="board" id="board">
        <div class="cell" onclick="humanMove(0)"></div>
        <div class="cell" onclick="humanMove(1)"></div>
        <div class="cell" onclick="humanMove(2)"></div>
        <div class="cell" onclick="humanMove(3)"></div>
        <div class="cell" onclick="humanMove(4)"></div>
        <div class="cell" onclick="humanMove(5)"></div>
        <div class="cell" onclick="humanMove(6)"></div>
        <div class="cell" onclick="humanMove(7)"></div>
        <div class="cell" onclick="humanMove(8)"></div>
    </div>
    <div class="status" id="status">Sua vez!</div>
    <button onclick="resetGame()">Reiniciar Jogo</button>

    <script>
        let origBoard = Array.from(Array(9).keys());
        const huPlayer = 'X';
        const aiPlayer = 'O';
        const winCombos = [[0,1,2],[3,4,5],[6,7,8],[0,3,6],[1,4,7],[2,5,8],[0,4,8],[6,4,2]];
        const cells = document.querySelectorAll('.cell');
        let gameActive = true;

        function humanMove(id) {
            if (typeof origBoard[id] === 'number' && gameActive) {
                turn(id, huPlayer);
                if (!checkWin(origBoard, huPlayer) && !checkTie() && gameActive) {
                    document.getElementById('status').innerText = "Yuri está calculando...";
                    gameActive = false; // Bloqueia clique enquanto Yuri "pensa"
                    setTimeout(() => {
                        turn(bestSpot(), aiPlayer);
                        if (!checkWin(origBoard, aiPlayer)) gameActive = true;
                        if (gameActive) document.getElementById('status').innerText = "Sua vez!";
                    }, 500);
                }
            }
        }

        function turn(squareId, player) {
            origBoard[squareId] = player;
            cells[squareId].innerText = player;
            cells[squareId].classList.add(player.toLowerCase());
            let gameWon = checkWin(origBoard, player);
            if (gameWon) gameOver(gameWon);
        }

        function checkWin(board, player) {
            let plays = board.reduce((a, e, i) => (e === player) ? a.concat(i) : a, []);
            let gameWon = null;
            for (let [index, win] of winCombos.entries()) {
                if (win.every(elem => plays.indexOf(elem) > -1)) {
                    gameWon = {index: index, player: player};
                    break;
                }
            }
            return gameWon;
        }

        function gameOver(gameWon) {
            gameActive = false;
            document.getElementById('status').innerText = gameWon.player === huPlayer ? "Você venceu! (Impossível!)" : "Yuri venceu!";
        }

        function checkTie() {
            if (origBoard.filter(s => typeof s === 'number').length === 0) {
                document.getElementById('status').innerText = "Empate!";
                gameActive = false;
                return true;
            }
            return false;
        }

        function bestSpot() {
            return minimax(origBoard, aiPlayer).index;
        }

        function minimax(newBoard, player) {
            let availSpots = newBoard.filter(s => typeof s === 'number');

            if (checkWin(newBoard, huPlayer)) return {score: -10};
            else if (checkWin(newBoard, aiPlayer)) return {score: 10};
            else if (availSpots.length === 0) return {score: 0};

            let moves = [];
            for (let i = 0; i < availSpots.length; i++) {
                let move = {};
                move.index = newBoard[availSpots[i]];
                newBoard[availSpots[i]] = player;

                if (player == aiPlayer) {
                    let result = minimax(newBoard, huPlayer);
                    move.score = result.score;
                } else {
                    let result = minimax(newBoard, aiPlayer);
                    move.score = result.score;
                }

                newBoard[availSpots[i]] = move.index;
                moves.push(move);
            }

            let bestMove;
            if (player === aiPlayer) {
                let bestScore = -10000;
                for (let i = 0; i < moves.length; i++) {
                    if (moves[i].score > bestScore) {
                        bestScore = moves[i].score;
                        bestMove = i;
                    }
                }
            } else {
                let bestScore = 10000;
                for (let i = 0; i < moves.length; i++) {
                    if (moves[i].score < bestScore) {
                        bestScore = moves[i].score;
                        bestMove = i;
                    }
                }
            }
            return moves[bestMove];
        }

        function resetGame() {
            origBoard = Array.from(Array(9).keys());
            gameActive = true;
            document.getElementById('status').innerText = "Sua vez!";
            cells.forEach(cell => {
                cell.innerText = '';
                cell.classList.remove('x', 'o');
            });
        }
    </script>
</body>
</html>
