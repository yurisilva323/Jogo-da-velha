<!DOCTYPE html>
<html lang="pt-br">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Jogo da Velha - Player vs Yuri</title>
    <style>
        :root { --primary: #0984e3; --dark: #2c3e50; }
        body { font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif; background-color: #f0f2f5; display: flex; flex-direction: column; align-items: center; justify-content: center; height: 100vh; margin: 0; }
        .board { display: grid; grid-template-columns: repeat(3, 100px); grid-template-rows: repeat(3, 100px); gap: 12px; background-color: var(--dark); padding: 12px; border-radius: 12px; box-shadow: 0 15px 35px rgba(0,0,0,0.2); }
        .cell { width: 100px; height: 100px; background-color: #fff; display: flex; align-items: center; justify-content: center; font-size: 3rem; font-weight: bold; cursor: pointer; border-radius: 8px; }
        .cell.x { color: var(--primary); }
        .cell.o { color: #e74c3c; }
        .status { margin-top: 25px; font-size: 1.4rem; font-weight: 700; color: var(--dark); height: 40px; text-transform: uppercase; }
        button { margin-top: 25px; padding: 12px 30px; cursor: pointer; background: var(--primary); color: white; border: none; border-radius: 8px; font-weight: bold; }
        h1 { margin-bottom: 20px; font-size: 2rem; color: var(--dark); }
    </style>
</head>
<body>
    <h1>Player vs Yuri</h1>
    
    <div class="board" id="board">
        <div class="cell" onclick="play(0)"></div>
        <div class="cell" onclick="play(1)"></div>
        <div class="cell" onclick="play(2)"></div>
        <div class="cell" onclick="play(3)"></div>
        <div class="cell" onclick="play(4)"></div>
        <div class="cell" onclick="play(5)"></div>
        <div class="cell" onclick="play(6)"></div>
        <div class="cell" onclick="play(7)"></div>
        <div class="cell" onclick="play(8)"></div>
    </div>

    <div class="status" id="status">Sua vez!</div>
    <button onclick="reset()">Reiniciar Jogo</button>

    <script>
        let b = Array(9).fill(null);
        let active = true;
        const hu = 'X', ai = 'O';
        const wins = [[0,1,2],[3,4,5],[6,7,8],[0,3,6],[1,4,7],[2,5,8],[0,4,8],[2,4,6]];

        function play(i) {
            if (!b[i] && active) {
                move(i, hu);
                if (!check(b, hu) && b.includes(null)) {
                    document.getElementById('status').innerText = "Yuri pensando...";
                    active = false;
                    setTimeout(() => {
                        move(best(), ai);
                        if (!check(b, ai)) active = true;
                        document.getElementById('status').innerText = active ? "Sua vez!" : "";
                    }, 400);
                }
            }
        }

        function move(i, p) {
            b[i] = p;
            const c = document.querySelectorAll('.cell')[i];
            c.innerText = p;
            c.classList.add(p.toLowerCase());
            if (check(b, p)) end(p === hu ? "Você venceu!" : "Yuri venceu!");
            else if (!b.includes(null)) end("Empate!");
        }

        function check(board, p) {
            return wins.some(s => s.every(i => board[i] === p));
        }

        function end(msg) {
            document.getElementById('status').innerText = msg;
            active = false;
        }

        function best() {
            let bestScore = -Infinity;
            let move;
            for (let i = 0; i < 9; i++) {
                if (!b[i]) {
                    b[i] = ai;
                    let score = minimax(b, 0, false);
                    b[i] = null;
                    if (score > bestScore) {
                        bestScore = score;
                        move = i;
                    }
                }
            }
            return move;
        }

        function minimax(board, depth, isMax) {
            if (check(board, ai)) return 10 - depth;
            if (check(board, hu)) return depth - 10;
            if (!board.includes(null)) return 0;

            if (isMax) {
                let best = -Infinity;
                for (let i = 0; i < 9; i++) {
                    if (!board[i]) {
                        board[i] = ai;
                        best = Math.max(best, minimax(board, depth + 1, false));
                        board[i] = null;
                    }
                }
                return best;
            } else {
                let best = Infinity;
                for (let i = 0; i < 9; i++) {
                    if (!board[i]) {
                        board[i] = hu;
                        best = Math.min(best, minimax(board, depth + 1, true));
                        board[i] = null;
                    }
                }
                return best;
            }
        }

        function reset() {
            b = Array(9).fill(null);
            active = true;
            document.getElementById('status').innerText = "Sua vez!";
            document.querySelectorAll('.cell').forEach(c => {
                c.innerText = "";
                c.classList.remove('x', 'o');
            });
        }
    </script>
</body>
</html>
