<!DOCTYPE html>
<html lang="pt-br">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Jogo da Velha - Yuri vs Player</title>
    <style>
        :root {
            --primary: #0984e3;
            --dark: #2d3436;
            --light: #dfe6e9;
        }
        body {
            font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif;
            background-color: #f5f6fa;
            display: flex;
            flex-direction: column;
            align-items: center;
            justify-content: center;
            height: 100vh;
            margin: 0;
        }
        h1 { color: var(--dark); margin-bottom: 10px; }
        .scoreboard {
            margin-bottom: 20px;
            font-size: 1.2rem;
            font-weight: bold;
            color: var(--dark);
        }
        .board {
            display: grid;
            grid-template-columns: repeat(3, 100px);
            grid-template-rows: repeat(3, 100px);
            gap: 10px;
            background-color: var(--dark);
            padding: 10px;
            border-radius: 10px;
            box-shadow: 0 10px 20px rgba(0,0,0,0.1);
        }
        .cell {
            width: 100px;
            height: 100px;
            background-color: white;
            display: flex;
            align-items: center;
            justify-content: center;
            font-size: 2.5rem;
            font-weight: bold;
            cursor: pointer;
            border-radius: 5px;
            transition: background 0.3s;
        }
        .cell:hover { background-color: #f0f0f0; }
        .cell.x { color: var(--primary); }
        .cell.o { color: #d63031; }
        .status {
            margin-top: 20px;
            font-size: 1.1rem;
            height: 30px;
            font-weight: 600;
        }
        button {
            margin-top: 20px;
            padding: 10px 25px;
            font-size: 1rem;
            background-color: var(--primary);
            color: white;
            border: none;
            border-radius: 5px;
            cursor: pointer;
            transition: opacity 0.3s;
        }
        button:hover { opacity: 0.8; }
    </style>
</head>
<body>
    <h1>Jogo da Velha</h1>
    <div class="scoreboard">Jogador (X) vs <span style="color: #d63031;">Yuri (O)</span></div>
    
    <div class="board" id="board">
        <div class="cell" data-index="0"></div>
        <div class="cell" data-index="1"></div>
        <div class="cell" data-index="2"></div>
        <div class="cell" data-index="3"></div>
        <div class="cell" data-index="4"></div>
        <div class="cell" data-index="5"></div>
        <div class="cell" data-index="6"></div>
        <div class="cell" data-index="7"></div>
        <div class="cell" data-index="8"></div>
    </div>

    <div class="status" id="status">Sua vez!</div>
    <button onclick="resetGame()">Reiniciar Jogo</button>

    <script>
        const board = document.getElementById('board');
        const cells = document.querySelectorAll('.cell');
        const statusText = document.getElementById('status');
        let gameActive = true;
        let currentPlayer = "X";
        let gameState = ["", "", "", "", "", "", "", "", ""];

        const winningConditions = [
            [0, 1, 2], [3, 4, 5], [6, 7, 8],
            [0, 3, 6], [1, 4, 7], [2, 5, 8],
            [0, 4, 8], [2, 4, 6]
        ];

        function handleCellClick(clickedCellEvent) {
            const clickedCell = clickedCellEvent.target;
            const clickedCellIndex = parseInt(clickedCell.getAttribute('data-index'));

            if (gameState[clickedCellIndex] !== "" || !gameActive || currentPlayer === "O") {
                return;
            }

            makeMove(clickedCell, clickedCellIndex, "X");
            
            if (gameActive) {
                statusText.innerText = "Yuri está pensando...";
                setTimeout(yuriMove, 600);
            }
        }

        function makeMove(cell, index, player) {
            gameState[index] = player;
            cell.innerText = player;
            cell.classList.add(player.toLowerCase());
            checkResult();
        }
